extractor:
  name: mediapipe

clip_video:
  codec: copy

person_localize:
  model: "yolov8n.pt"
  confidence_threshold: 0.5
  sample_strategy: "skip_frame"   # "skip_frame" (default) or "uniform"
  frame_skip: 2                   # skip_frame: take 1 frame every (frame_skip+1) frames
  sample_frames: 5                # uniform: exact count; skip_frame: max frame count
  device: "cuda:0"
  min_bbox_area: 0.05

crop_video:
  padding: 0.25
  codec: "libx264"

processing:
  max_workers: 4
  target_fps: 24.0
  frame_skip: 2
  accept_fps_range: [24.0, 60.0]
  skip_existing: true
  min_duration: 0.2
  max_duration: 60.0

webdataset:
  max_shard_count: 10000